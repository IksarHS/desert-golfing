<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Desert Golfing</title>
<link href="https://fonts.googleapis.com/css2?family=Silkscreen&family=VT323&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #d5ad72; display: flex; align-items: center; justify-content: center; }
  canvas { display: block; cursor: crosshair; }
  #branch-label {
    position: fixed; top: 6px; right: 10px;
    font: 11px 'Silkscreen', monospace;
    color: rgba(255,255,255,0.3);
    pointer-events: none; z-index: 100;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="branch-label"></div>
<script>
  // Auto-detect branch from branch.json (generated by build/serve scripts)
  // Falls back to empty if not available — keeps index.html identical across branches
  fetch('branch.json').then(r => r.ok ? r.json() : {}).then(d => {
    if (d.branch && d.branch !== 'main') {
      document.getElementById('branch-label').textContent = d.branch.toUpperCase().replace(/-/g, ' ');
      document.title = d.branch.toUpperCase().replace(/-/g, ' ') + ' — Desert Golfing';
    }
  }).catch(() => {});
</script>
<script src="src/shared.js"></script>
<script src="src/level-design.js"></script>
<script src="src/art.js"></script>
<script src="src/gameplay.js"></script>
<script src="src/debug.js"></script>
<script src="src/main.js"></script>
</body>
</html>
